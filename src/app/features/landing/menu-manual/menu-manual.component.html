<form class="manual-form" (ngSubmit)="addItem()">
  <label>
    <span>Menu Name</span>
    <input name="name" type="text" [(ngModel)]="name" placeholder="Nasi Goreng Ayam" />
  </label>

  <label>
    <span>Selling Price</span>
    <input name="sellingPrice" type="number" min="0" [(ngModel)]="sellingPrice" placeholder="25000" />
  </label>

  <button type="submit">Add Item</button>
</form>

@if (error()) {
  <p class="error">{{ error() }}</p>
}
